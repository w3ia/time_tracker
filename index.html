<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Punchcard — personal time ledger</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23171310'/><circle cx='16' cy='16' r='9' fill='none' stroke='%23e8a13c' stroke-width='2.5'/><path d='M16 10v6l4 3' fill='none' stroke='%23e8a13c' stroke-width='2.5' stroke-linecap='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Albert+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 28 34" aria-hidden="true">
      <path d="M3 1h17l7 7v25H3z" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <path d="M20 1v7h7" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="9"  cy="13" r="1.6" fill="currentColor"/>
      <circle cx="15" cy="13" r="1.6" fill="currentColor"/>
      <circle cx="9"  cy="19" r="1.6" fill="currentColor"/>
      <circle cx="21" cy="19" r="1.6" fill="currentColor"/>
      <circle cx="15" cy="25" r="1.6" fill="currentColor"/>
      <circle cx="21" cy="25" r="1.6" fill="currentColor"/>
    </svg>
    <div class="brand-text">
      <h1>Punchcard</h1>
      <span class="tagline">personal time ledger</span>
    </div>
  </div>

  <nav class="tabs" role="tablist">
    <button class="tab" data-action="tab" data-tab="today">Today</button>
    <button class="tab" data-action="tab" data-tab="history">History</button>
  </nav>

  <div class="topbar-right">
    <span class="today-date" id="header-date"></span>
    <button class="btn btn-export" data-action="export" title="Export every session to CSV">⤓ Export CSV</button>
  </div>
</header>

<main id="app"></main>

<footer class="foot">all data stays on this machine · stored in your browser's localStorage</footer>

<script src="app.js"></script>
</body>
</html>
